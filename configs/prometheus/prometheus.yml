global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:

  # Host system metrics (via node_exporter if installed)
  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]

  # Postgres metrics (via postgres_exporter if added to compose)
  - job_name: "postgres"
    static_configs:
      - targets: ["host.docker.internal:9187"]

  # Redis metrics (via redis_exporter if added to compose)
  - job_name: "redis"
    static_configs:
      - targets: ["host.docker.internal:9121"]

  # n8n health endpoint
  - job_name: "n8n"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["n8n:5678"]
