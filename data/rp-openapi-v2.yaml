  /trigger-service/api/v1/subscribe:
    post:
      tags:
        - Webhook Subscriptions
      summary: Subscribe Webhook
      description: Subscribe a new webhook
      operationId: subscribeWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookSubscribeRequest'
            examples:
              LEAD_CONFIGURATION_FINALIZED:
                description: LEAD_CONFIGURATION_FINALIZED
                value:
                  executorName: webhook_executor
                  url: https://example.com/webhook
                  events:
                    - LEAD_CONFIGURATION_FINALIZED
                  scope: {}
                  headers:
                    Authorization: Bearer your_token_here
              CRM_BACKLOG_ITEM_CREATED:
                description: CRM_BACKLOG_ITEM_CREATED
                value:
                  executorName: webhook_executor
                  url: https://example.com/webhook
                  events:
                    - CRM_BACKLOG_ITEM_CREATED
                  scope:
                    item_type: LEADS
                  headers:
                    Authorization: Bearer your_token_here
              CRM_BACKLOG_ITEM_RESULT_CHANGE:
                description: CRM_BACKLOG_ITEM_RESULT_CHANGE
                value:
                  executorName: webhook_executor
                  url: https://example.com/webhook
                  events:
                    - CRM_BACKLOG_ITEM_RESULT_CHANGE
                  scope:
                    result: won
                  headers:
                    Authorization: Bearer your_token_here
              CRM_BACKLOG_ITEM_STATUS_CHANGE:
                description: CRM_BACKLOG_ITEM_STATUS_CHANGE
                value:
                  executorName: webhook_executor
                  url: https://example.com/webhook
                  events:
