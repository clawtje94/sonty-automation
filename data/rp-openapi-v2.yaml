      ## Glossary
      - **Note** — Represents a note associated with a contact, including details such as content, creation date, and author.
      - **Contact** — Represents an individual or entity to whom notes can be attached, including their personal or business details.
  - name: Register
    description: Endpoints for lead registration and management
  - name: register-service:intro
    description: |
      ## Glossary
      - **Registration** — The process of signing up or enrolling for our services.
      - **Lead** — A potential customer who has shown interest in our services.
  - name: Maintenance
    description: Endpoints for maintenance tasks such as managing info banners.
  - name: User
    description: Endpoints for user management.
  - name: user-service:intro
    description: |+
      ## Glossary
      - **Company Profile** — Represents a company's profile information, including details such as name, address, and contact information.
      - **User** — Represents an individual associated with a Company Profile, including their personal details and account information.

  - name: Health
    description: Endpoints for retrieving health and play run information.
  - name: zookeeper-service:intro
    description: |+
      ## Glossary
      - **Automation** — A combination of trigger and action that causes a specific task to be performed.
      - **Trigger** — The cause of an automation. It triggers the automation to start.
      - **Action** — The consequence of a trigger. It performs an action when the trigger occurs.
      - **Play** — Represents an automation that performs a task. It is executed each time the trigger of the automation occurs.
      - **Run** — Represents a single execution of a play. A play can be executed multiple times, and each execution is a run.

