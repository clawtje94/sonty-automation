  - name: trigger-service:intro
    description: |
      ## Automations
      Automations within Reuzenpanda are used to automate repetitive tasks and processes. They consist of triggers and actions that work together to perform specific functions based on predefined conditions.
      Read more about automations [here](https://docs.reuzenpanda.app/automations).

      ## Glossary
      - **Automation** — A combination of trigger and action that causes a specific task to be performed.
      - **Plays** — A Play is one execution of an automation.
      - **Runs** — A Run is one execution of a Play.
      - **Trigger** — The cause of an automation. It triggers the automation to start.
      - **Action** — The consequence of a trigger. It performs an action when the trigger occurs.

      # Webhooks

      The webhooks in Reuzenpanda controls many triggers within the automation system. To integrate with webhooks, you can subscribe to webhooks within Reuzenpanda to use them as triggers for your own software.
      The important part is to know the Payload structure that is send with each webhook. To find the webhook events and their payloads, please refer to the `Webhooks` section in the OpenAPI documentation.
    x-displayName: Introduction
