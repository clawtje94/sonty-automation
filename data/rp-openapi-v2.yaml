components:
  schemas:
    QueueMessageRequest:
      type: object
      properties:
        message:
          $ref: '#/components/schemas/EmailMessage'
        companyProfileId:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - MAILGUN
            - EMAIL_ENGINE
            - WHATSAPP
            - CHAT_DIRECT_MESSAGE
            - PHONE_NUMBER
        conversationAccountId:
          type: string
        attachmentIds:
          type: array
          items:
            type: string
        agentId:
          type: string
          format: uuid
        sendToAllRecipients:
          type: boolean
      required:
        - companyProfileId
        - message
    EmailMessage:
      type: object
      properties:
        senderScope:
          type: string
        templateScope:
          type: string
        recipients:
          type: array
          items:
            $ref: '#/components/schemas/Recipient'
        subject:
          type: string
        content:
          type: string
        templateVariables:
          type: object
          additionalProperties: {}
        headerVariables:
          type: object
          additionalProperties:
            type: string
        renderedAttachments:
          type: array
          items:
            $ref: '#/components/schemas/RenderedAttachment'
        staticAttachments:
          type: array
          items:
            $ref: '#/components/schemas/S3Attachment'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/File'
        conversationChatId:
          type: string
          format: uuid
        conversationAccountId:
          type: string
        agentId:
          type: string
          format: uuid
        automationId:
          type: string
          format: uuid
        replyToId:
          type: string
        replyToAction:
          type: string
        metaTemplate:
          $ref: '#/components/schemas/MetaTemplate'
      required:
        - content
    Recipient:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        type:
          $ref: '#/components/schemas/RecipientType'
    RecipientType: {}
    RenderedAttachment:
      type: object
      properties:
        documentId:
          type: string
          format: uuid
        versionId:
          type: string
          format: uuid
        artifactName:
          type: string
        artifactType:
          type: string
    S3Attachment:
      type: object
      properties:
        path:
          type: string
        fileName:
          type: string
        extension:
          type: string
        mimeType:
          type: string
    File:
      type: object
      properties:
        data:
          type: string
          format: byte
        name:
          type: string
        extension:
          type: string
        mimeType:
          type: string
        nameAndExtensionFrom:
          type: string
          writeOnly: true
        dataBase64:
          type: string
    MetaTemplate:
      type: object
      properties:
        translationId:
          type: integer
          format: int64
        bodyParameters:
          type: object
          additionalProperties:
            type: string
    EmailSendResponse:
      type: object
      properties:
        message:
          type: string
        problem:
          type: string
        originalMessage:
          type: string
        response:
          $ref: '#/components/schemas/MaasSentResponse'
    MaasSentResponse:
      type: object
      properties:
        sent:
          type: boolean
        messageId:
          type: string
        plainTextBody:
          type: string
        messageContent: {}
        messageMetadata: {}
    ResponseObject:
      type: object
      properties:
        message:
          type: string
    UploadAttachmentRequest:
      type: object
      properties:
        companyProfileId:
          type: string
          format: uuid
        renderedAttachments:
          type: array
          items:
            $ref: '#/components/schemas/RenderedAttachment'
        staticAttachments:
          type: array
          items:
            $ref: '#/components/schemas/S3Attachment'
    UploadAttachmentResponse:
      type: object
      properties:
        message:
          type: string
        uploadedFiles:
          type: object
          additionalProperties:
            type: string
    UpdateMessageReactionRequest:
      type: object
      properties:
        reaction:
          type: string
    ConversationMessageResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: '#/components/schemas/ConversationMessage'
    ConversationMessage:
      type: object
      properties:
        id:
          type: string
        msgId:
          type: string
        accountId:
          type: string
        receivedDate:
          type: string
          format: date-time
        updatedDate:
          type: string
          format: date-time
        type:
          type: string
          enum:
            - EMAIL
            - WHATSAPP
            - CALL_LOG
        message:
          $ref: '#/components/schemas/AbstractConversationMessage'
