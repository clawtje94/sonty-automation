  - name: conversation-service:intro
    description: |+
      ## Conversation Module
      Reuzenpanda's Conversation Module is a central messaging hub that lets you communicate with customers through email and Whatsapp directly from Reuzenpanda. You connect one or more conversation accounts
      (private or shared) and use them in Leads/Deals, Documents, and Automations to send messages. You can read more about the Conversation Module in our [documentation](https://docs.reuzenpanda.app/conversation).

      ## Glossary
      - **Company Profile** — An account of a whole company which contains several users.
      - **Conversation Account** — An account representing a specific email adress or whatsapp number.
      - **Conversation Chat** — Represents a conversation within an account.
      - **Conversation Message** — A message sent or received within an account.

    x-displayName: Introduction
