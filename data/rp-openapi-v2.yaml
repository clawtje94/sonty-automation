  /conversation-service/v1/chats/{chatId}/messages:
    post:
      tags:
        - Chats
      summary: Queue Chat Message
      description: Queue a message to be sent in a conversation chat.
      operationId: queueChatMessage
      parameters:
        - name: chatId
          in: path
          description: The Id of a Conversation Chat
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueueMessageRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailSendResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseObject'
              examples:
                Invalid Permission:
                  $ref: '#/components/examples/GenericInvalidPermission400'
                chatId - Chat id is not a valid UUID:
                  value: null
              example:
                message: INVALID_PERMISSION
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseObject'
              examples:
                Could not read token:
                  $ref: '#/components/examples/GenericCouldNotReadToken401'
                Invalid token:
                  $ref: '#/components/examples/GenericInvalidToken401'
                No user:
                  $ref: '#/components/examples/GenericNoUser401'
                Invalid Permission:
                  $ref: '#/components/examples/GenericInvalidPermission401'
              example:
                message: COULD_NOT_READ_TOKEN
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseObject'
              examples:
                Invalid Permission:
                  $ref: '#/components/examples/GenericInvalidPermission403'
              example:
                message: INVALID_PERMISSION
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
