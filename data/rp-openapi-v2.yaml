  - name: contact-service-2:intro
    description: |
      ## CRM
      The CRM system is used to track and manage leads and deals. You can manage these per board and per pipeline for a customized overview which is best for your use-case.
      Read more about the CRM system [here](https://docs.reuzenpanda.app/crm).

      ## Relations
      The Relations Module is used to keep track of customers as a person or as a organisation.
      Read more about Relations [here](https://docs.reuzenpanda.app/relations).

      ## Glossary
      - **Subject** — (Mostly a request) is used to connect leads, deals, documents, notes, contactpersons & organisations with eachother.
      - **Lead Configuration** — Form submission of a lead.
      - **Backlog** — A pipeline in Reuzenpanda.
      - **Backlog Column** — A column of a pipeline.
      - **Backlog Item** — A Lead or Deal in a Pipeline.
      - **Organisation** — A company or business entity within relations.
      - **Contact Person** — An individual (mostly) associated with an organisation within relations.
    x-displayName: Introduction
