  - name: company-profile-service:intro
    description: |
      ## Company Profiles
      A Company Profile is an account for a whole company which contains several users. Each user can have different roles and permissions within the Company Profile.
      Everything that is done is on behalf of the Company Profile, not on behalf of the individual user. So if a user makes changes, those changes are made to the Company Profile the user is logged in to at that moment.

      ## Glossary
      - **Company Profile** — An account of a whole company which contains several users.
      - **User** — Member of a Company Profile.
    x-displayName: Introduction
