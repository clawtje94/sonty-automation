# Sonty — Nginx config for production n8n
# File: /etc/nginx/sites-enabled/automation.conf

# ─── n8n ──────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name automation.sonty.nl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name automation.sonty.nl;

    ssl_certificate     /etc/letsencrypt/live/automation.sonty.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/automation.sonty.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=n8n_ui:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=60r/m;

    client_max_body_size 16M;

    # n8n UI — restrict to known IPs only (staff + VPN)
    location / {
        allow 1.2.3.4;       # Office IP — replace before provisioning
        allow 127.0.0.1;
        deny all;

        limit_req zone=n8n_ui burst=5 nodelay;

        proxy_pass         http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Webhooks — public, rate-limited
    location /webhook/ {
        limit_req zone=webhook burst=20 nodelay;

        proxy_pass         http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
