# Sonty — Nginx config for production Grafana
# File: /etc/nginx/sites-enabled/grafana.conf

server {
    listen 80;
    server_name grafana.sonty.nl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name grafana.sonty.nl;

    ssl_certificate     /etc/letsencrypt/live/automation.sonty.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/automation.sonty.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;

    # Restrict to office/VPN IP only — owner access
    allow 1.2.3.4;       # Office IP — replace before provisioning
    allow 127.0.0.1;
    deny all;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
