# Sonty — Nginx config for staging n8n + Grafana
# File: /etc/nginx/sites-enabled/automation-staging.conf

# ─── n8n ──────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name staging.automation.sonty.nl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name staging.automation.sonty.nl;

    ssl_certificate     /etc/letsencrypt/live/staging.automation.sonty.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.automation.sonty.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Rate limiting for webhook endpoints
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/m;

    client_max_body_size 16M;

    location / {
        proxy_pass         http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Webhook endpoints — apply rate limiting
    location /webhook/ {
        limit_req zone=webhook burst=10 nodelay;
        proxy_pass         http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ─── Grafana (staging) — no public access ─────────────────────────────────
server {
    listen 80;
    server_name staging.grafana.sonty.nl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name staging.grafana.sonty.nl;

    ssl_certificate     /etc/letsencrypt/live/staging.automation.sonty.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.automation.sonty.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Restrict to office/VPN IP — replace with actual IP
    allow 1.2.3.4;       # Office IP — replace before provisioning
    allow 127.0.0.1;
    deny all;

    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
