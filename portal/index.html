<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonty Portaal — Medewerkers</title>
  <link rel="icon" href="https://cdn.prod.website-files.com/666ab30f0f595f63bc4b0971/666ab58ba2dd970e144ccb1c_logo-sonty.webp" type="image/webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --dark: #141414;
      --dark-card: #1a1a1a;
      --dark-border: #2a2a2a;
      --gray: #888;
      --light-gray: #bbb;
      --white: #f5f5f5;
      --accent: #FF6B00;
      --accent-hover: #e55f00;
      --green: #2ecc71;
      --red: #e74c3c;
      --blue: #3498db;
      --purple: #9b59b6;
      --font-display: 'Permanent Marker', cursive;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --radius: 16px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Login Screen */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-box {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius);
      padding: 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .login-logo { height: 48px; margin-bottom: 24px; }
    .login-box h1 {
      font-family: var(--font-display);
      font-size: 28px;
      margin-bottom: 8px;
      color: var(--white);
    }
    .login-box h1 .accent { color: var(--accent); }
    .login-subtitle {
      color: var(--gray);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .role-btn {
      background: var(--dark);
      border: 2px solid var(--dark-border);
      border-radius: var(--radius-sm);
      padding: 24px 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .role-btn:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .role-icon { font-size: 32px; margin-bottom: 8px; display: block; }
    .role-label { font-size: 14px; font-weight: 600; color: var(--white); }

    /* App Layout */
    .app { display: none; }
    .app.active { display: block; }

    .header {
      background: var(--dark);
      border-bottom: 1px solid var(--dark-border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-logo { height: 32px; }
    .header h1 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 400;
      color: var(--white);
    }
    .header h1 .accent { color: var(--accent); }
    .header-role {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 12px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logout-btn {
      background: transparent;
      border: 1px solid var(--dark-border);
      color: var(--gray);
      padding: 6px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-body);
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--dark-border);
    }
    .tab {
      padding: 12px 20px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--gray);
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--white); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Section */
    .section-title {
      font-family: var(--font-display);
      font-size: 20px;
      color: var(--white);
      margin: 0 0 20px 0;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--accent);
      display: inline-block;
      letter-spacing: 1px;
    }

    /* Cards */
    .card {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #333; }
    .card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--white);
    }
    .card p {
      font-size: 13px;
      color: var(--gray);
      line-height: 1.6;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .stat-card .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--gray);
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .stat-card .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--white);
    }
    .stat-card .stat-value.accent { color: var(--accent); }

    /* Pipeline */
    .pipeline-stage {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--dark);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
    }
    .pipeline-stage .stage-name {
      flex: 1;
      font-size: 13px;
      color: var(--light-gray);
    }
    .pipeline-stage .stage-count {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      min-width: 30px;
      text-align: right;
    }
    .pipeline-stage .stage-bar {
      height: 6px;
      border-radius: 3px;
      background: var(--accent);
      transition: width 0.3s;
    }

    /* Guide */
    .guide-step {
      display: flex;
      gap: 16px;
      padding: 16px;
      background: var(--dark);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
    }
    .guide-step:hover { border-color: #444; }
    .step-number {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    .step-content { flex: 1; }
    .step-title { font-size: 14px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
    .step-desc { font-size: 12px; color: var(--gray); line-height: 1.5; }

    /* Idea form */
    .idea-form {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
    }
    .idea-form h3 { font-size: 16px; margin-bottom: 16px; color: var(--white); }
    .form-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--gray);
      letter-spacing: 0.5px;
      font-weight: 500;
    }
    .field input, .field textarea {
      padding: 10px 14px;
      border: 1px solid var(--dark-border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      background: var(--dark);
      color: var(--white);
      font-family: var(--font-body);
      outline: none;
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 60px; }
    .submit-btn {
      padding: 10px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: var(--accent-hover); }

    .success-msg {
      background: rgba(46,204,113,0.15);
      color: var(--green);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* FAQ */
    .faq-item {
      background: var(--dark);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      overflow: hidden;
    }
    .faq-question {
      padding: 14px 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--white);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }
    .faq-question:hover { background: rgba(255,107,0,0.05); }
    .faq-arrow { color: var(--accent); transition: transform 0.2s; }
    .faq-answer {
      padding: 0 18px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s, padding 0.3s;
      font-size: 13px;
      color: var(--gray);
      line-height: 1.6;
    }
    .faq-item.open .faq-answer {
      padding: 0 18px 14px;
      max-height: 300px;
    }
    .faq-item.open .faq-arrow { transform: rotate(90deg); }

    /* Responsive */
    @media (max-width: 768px) {
      .container { padding: 16px; }
      .role-grid { grid-template-columns: 1fr; }
      .login-box { padding: 32px 24px; }
      .header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
      .header h1 { font-size: 18px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .form-row { flex-direction: column; }
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <img src="https://cdn.prod.website-files.com/666ab30f0f595f63bc4b0971/666ab30f0f595f63bc4b0b6e_Logo_White.webp" alt="Sonty" class="login-logo">
      <h1><span class="accent">SONTY</span> PORTAAL</h1>
      <p class="login-subtitle">Kies je afdeling om in te loggen</p>
      <div class="role-grid">
        <button class="role-btn" data-role="sales">
          <span class="role-icon">&#128222;</span>
          <span class="role-label">Sales</span>
        </button>
        <button class="role-btn" data-role="planning">
          <span class="role-icon">&#128197;</span>
          <span class="role-label">Planning</span>
        </button>
        <button class="role-btn" data-role="monteurs">
          <span class="role-icon">&#128295;</span>
          <span class="role-label">Monteurs & Inmeters</span>
        </button>
        <button class="role-btn" data-role="klantenservice">
          <span class="role-icon">&#128172;</span>
          <span class="role-label">Klantenservice</span>
        </button>
      </div>
    </div>
  </div>

  <!-- App -->
  <div class="app" id="app">
    <div class="header">
      <div class="header-left">
        <img src="https://cdn.prod.website-files.com/666ab30f0f595f63bc4b0971/666ab30f0f595f63bc4b0b6e_Logo_White.webp" alt="Sonty" class="header-logo">
        <h1><span class="accent">SONTY</span> PORTAAL</h1>
        <span class="header-role" id="headerRole"></span>
      </div>
      <div class="header-right">
        <button class="logout-btn" onclick="logout()">Uitloggen</button>
      </div>
    </div>

    <div class="container">
      <div class="tabs" id="tabsContainer"></div>
      <div id="tabContent"></div>
    </div>
  </div>

  <script src="portal.js"></script>
</body>
</html>
